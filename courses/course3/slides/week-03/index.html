<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 301 — Week 3: LLM Providers & Model Configuration</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 3",t:"LLM Provider Integrations in LangChain",b:["ChatOpenAI, ChatAnthropic, and ChatGoogle provide unified wrappers for major LLM APIs","All providers share a consistent interface — swap models without rewriting application logic","Installation: each provider has its own package (langchain-openai, langchain-anthropic, langchain-google-genai)","Authentication via environment variables (OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY)","Provider-specific features (function calling, vision, JSON mode) accessible through shared abstractions"]},
{w:"Week 3",t:"Model Parameters & Configuration",b:["temperature (0.0–2.0): controls randomness — lower for factual tasks, higher for creative generation","max_tokens: caps output length; prevents runaway responses and controls cost per call","top_p (nucleus sampling): alternative to temperature — limits token pool to cumulative probability threshold","frequency_penalty and presence_penalty: reduce repetition by penalizing already-used tokens","model selection: balance cost, speed, and capability — GPT-4o for complex reasoning, GPT-4o-mini for simple tasks"]},
{w:"Week 3",t:"Choosing Models Based on Task Requirements",b:["Classification and routing: use fast, cheap models (GPT-4o-mini, Claude Haiku) for high-volume simple tasks","Complex reasoning and analysis: use frontier models (GPT-4o, Claude Opus, Gemini Pro) for accuracy-critical work","Code generation: models with strong code training (GPT-4o, Claude Sonnet) outperform on programming tasks","Multimodal tasks: select models with vision capabilities when processing images or documents","Cost optimization: match model capability to task difficulty — don't use a $15/M token model for yes/no answers"]},
{w:"Week 3",t:"Fallback Chains & Model Resilience",b:["Fallback pattern: try the primary (expensive) model first, catch failures, retry with a cheaper backup","Use with_fallbacks() in LangChain to chain models: primary → secondary → tertiary","Handle rate limits, timeouts, and API outages gracefully without crashing the application","Implement retry logic with exponential backoff before falling back to alternate providers","Log which model ultimately served each request for cost tracking and quality monitoring"]},
{w:"Week 3",t:"Caching Strategies for Cost & Latency",b:["InMemoryCache: fastest lookup, lost on restart — good for development and short-lived processes","SQLiteCache: persistent local cache that survives restarts — ideal for single-server deployments","RedisCache: distributed caching for multi-instance production systems with shared state","Semantic caching: match similar (not identical) queries using embedding similarity for higher hit rates","Cache invalidation strategy: set TTLs based on content freshness requirements; stale AI responses can mislead"]},
{w:"Week 3",t:"Streaming Responses for Better UX",b:["Streaming sends tokens to the user as they are generated — eliminates perceived wait time","Use .stream() or .astream() methods; iterate over chunks and render incrementally in the UI","Server-Sent Events (SSE) or WebSockets deliver streamed tokens from backend to frontend","Streaming changes error handling — partial responses may arrive before a failure; handle gracefully","Combine streaming with callbacks to track token counts and latency even during streamed generation"]},
{w:"Week 3",t:"Callback Handlers for Logging & Monitoring",b:["Callbacks fire on lifecycle events: on_llm_start, on_llm_end, on_llm_error, on_chain_start, etc.","Built-in handlers: StdOutCallbackHandler for debugging, LangSmith for production tracing","Custom callbacks: log prompts and completions, track token usage, measure latency per call","Use callbacks to build dashboards — monitor cost, error rates, and model performance in real time","Attach callbacks globally (affects all calls) or per-invocation for targeted instrumentation"]},
{w:"Week 3",t:"Lab: Multi-Provider Application",b:["Build a FastAPI app that accepts user queries and routes them to OpenAI, Anthropic, or Google models","Implement a fallback chain: try Claude Sonnet → fall back to GPT-4o-mini → fall back to Gemini Flash","Add response caching with SQLite so repeated queries return instantly without API calls","Integrate streaming output via Server-Sent Events so the frontend renders tokens in real time","Instrument with custom callbacks that log model used, token count, latency, and cost per request"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 301 — Week 3: LLM Providers & Model Configuration</h1>
        <p>University of Michigan &bull; Applied LLM Engineering</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
