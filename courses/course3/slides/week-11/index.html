<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GENAI 301 – Week 11: Memory &amp; Conversation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #00274C; color: #fff; height: 100vh; display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 24px; background: #001a33; font-size: 14px; }
  .topbar a { color: #FFCB05; text-decoration: none; margin-right: 16px; }
  .topbar a:hover { text-decoration: underline; }
  .topbar .counter { color: #FFCB05; font-weight: 600; }
  .slide-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px 48px; }
  .slide-title { font-size: 20px; color: #FFCB05; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .slide-week { font-size: 14px; color: #FFCB05; opacity: 0.7; margin-bottom: 28px; }
  .slide-heading { font-size: 36px; font-weight: 700; margin-bottom: 32px; text-align: center; line-height: 1.2; }
  .bullets { list-style: none; max-width: 820px; width: 100%; }
  .bullets li { position: relative; padding: 12px 0 12px 32px; font-size: 20px; line-height: 1.5; border-bottom: 1px solid rgba(255,203,5,0.1); }
  .bullets li:last-child { border-bottom: none; }
  .bullets li::before { content: '▸'; color: #FFCB05; position: absolute; left: 0; font-size: 20px; }
  .nav { display: flex; justify-content: center; gap: 16px; padding: 18px; background: #001a33; }
  .nav button { background: #FFCB05; color: #00274C; border: none; padding: 10px 28px; font-size: 15px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: opacity .2s; }
  .nav button:disabled { opacity: 0.35; cursor: default; }
  .nav button:not(:disabled):hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const e = React.createElement;

const S = [
  {
    t: "Memory & Conversation",
    w: "Week 11",
    b: [
      "Every LLM API call is stateless — the model has no built-in memory of prior turns",
      "Memory modules inject conversation history into prompts to simulate continuity",
      "Without memory, chatbots repeat questions, forget context, and frustrate users",
      "Memory is the bridge between a single-shot Q&A tool and a true conversational agent",
      "This week: master LangChain memory types, persistence strategies, and session management"
    ]
  },
  {
    t: "Why Memory Matters in LLM Apps",
    w: "Week 11",
    b: [
      "Users expect chatbots to remember what was said earlier in the conversation",
      "Stateless calls force the developer to manually manage and re-inject context each turn",
      "Memory reduces redundant user input and enables multi-turn reasoning and follow-ups",
      "Proper memory management controls token usage — crucial for cost and latency optimization",
      "Real-world apps (customer support, tutoring, therapy bots) are unusable without conversation memory"
    ]
  },
  {
    t: "ConversationBufferMemory",
    w: "Week 11",
    b: [
      "Stores the complete raw conversation history — every human and AI message verbatim",
      "Simple to implement: just append each exchange to a growing list of messages",
      "Best for short conversations where total tokens stay well within the context window",
      "Downside: token count grows linearly; long conversations will exceed model limits and spike costs",
      "Use ConversationBufferWindowMemory (k=N) to keep only the last N exchanges as a sliding window"
    ]
  },
  {
    t: "ConversationSummaryMemory",
    w: "Week 11",
    b: [
      "Uses an LLM to progressively summarize the conversation instead of storing raw messages",
      "After each exchange, the running summary is updated to incorporate new information",
      "Token usage stays roughly constant regardless of conversation length — ideal for long sessions",
      "Trade-off: summarization can lose specific details, names, numbers, or exact phrasing",
      "Best when you need the gist of a long conversation but don't need word-for-word recall"
    ]
  },
  {
    t: "ConversationTokenBufferMemory",
    w: "Week 11",
    b: [
      "Keeps recent messages up to a specified max_token_limit, then drops the oldest turns",
      "Gives precise control over how many tokens memory consumes in each prompt",
      "More granular than BufferWindowMemory — trims by token count rather than message count",
      "Automatically adapts to varying message lengths; short messages retain more history",
      "Ideal when you need exact token budgeting to reserve space for system prompts and retrieval context"
    ]
  },
  {
    t: "Persistent Memory with Databases",
    w: "Week 11",
    b: [
      "In-memory storage vanishes when the server restarts — production apps need durable persistence",
      "Redis: blazing-fast key-value store, perfect for ephemeral chat sessions with optional TTL expiry",
      "PostgreSQL: structured storage with JSONB columns for conversation history and full SQL query power",
      "MongoDB: flexible document store, natural fit for nested message arrays and metadata per session",
      "LangChain provides RedisChatMessageHistory, PostgresChatMessageHistory, and similar integrations"
    ]
  },
  {
    t: "Session Management for Multi-User Apps",
    w: "Week 11",
    b: [
      "Each user (or conversation thread) needs an isolated session_id to prevent memory cross-contamination",
      "Map session IDs to authenticated user identities via your app's auth layer (JWT, OAuth, etc.)",
      "Implement session expiry and cleanup policies to bound storage growth and protect privacy",
      "Support multiple concurrent conversations per user by combining user_id + conversation_id as the key",
      "Design for horizontal scaling: stateless app servers + shared session store (Redis/DB) behind a load balancer"
    ]
  },
  {
    t: "Lab & Week Summary",
    w: "Week 11",
    b: [
      "Lab: Build a chatbot using ConversationBufferMemory, then swap in SummaryMemory and compare behavior",
      "Lab: Add Redis or PostgreSQL persistence so conversations survive server restarts",
      "Lab: Stress-test with 50+ turn conversations — observe token growth, latency, and summarization quality",
      "Key takeaway: choose memory strategy based on conversation length, detail needs, and token budget",
      "Next week: Retrieval-Augmented Generation (RAG) — giving your LLM access to external knowledge"
    ]
  }
];

function App() {
  const [idx, setIdx] = React.useState(0);
  const slide = S[idx];

  React.useEffect(() => {
    const handler = (ev) => {
      if (ev.key === 'ArrowRight' && idx < S.length - 1) setIdx(i => i + 1);
      if (ev.key === 'ArrowLeft' && idx > 0) setIdx(i => i - 1);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [idx]);

  return e('div', { style: { display: 'flex', flexDirection: 'column', height: '100vh' } },
    e('div', { className: 'topbar' },
      e('div', null,
        e('a', { href: '../index.html' }, '← Week Index'),
        e('a', { href: '../../site/index.html' }, '← Course Home')
      ),
      e('span', { className: 'counter' }, `${idx + 1} / ${S.length}`)
    ),
    e('div', { className: 'slide-area' },
      e('div', { className: 'slide-title' }, 'GENAI 301'),
      e('div', { className: 'slide-week' }, slide.w),
      e('div', { className: 'slide-heading' }, slide.t),
      e('ul', { className: 'bullets' },
        slide.b.map((b, i) => e('li', { key: i }, b))
      )
    ),
    e('div', { className: 'nav' },
      e('button', { onClick: () => setIdx(i => i - 1), disabled: idx === 0 }, '← Prev'),
      e('button', { onClick: () => setIdx(i => i + 1), disabled: idx === S.length - 1 }, 'Next →')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
