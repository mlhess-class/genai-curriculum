<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 3: The GenAI Ecosystem</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 3",t:"The Current LLM Landscape",b:["The AI model ecosystem is diverse: proprietary (closed-source) and open-weight models coexist","Major players: OpenAI (GPT), Anthropic (Claude), Google (Gemini), Meta (Llama), Mistral","Models differ in capabilities, pricing, context window, speed, and alignment approaches","No single model is best at everything — the right choice depends on your specific use case","Benchmarks exist but are imperfect; real-world testing is essential for evaluation"]},
{w:"Week 3",t:"OpenAI: GPT-4 and the GPT Family",b:["GPT-4 (2023) set the standard for reasoning, coding, and multimodal understanding","GPT-4 Turbo offers 128K context at lower cost; GPT-4o adds faster responses and native vision","Strengths: strong reasoning, coding, broad knowledge, large developer ecosystem","Weaknesses: closed-source, expensive at scale, occasional over-refusal on edge cases","OpenAI also offers DALL-E (images), Whisper (speech), and an extensive API platform"]},
{w:"Week 3",t:"Anthropic: Claude and Constitutional AI",b:["Claude 3 family (Haiku, Sonnet, Opus) spans fast/cheap to powerful/expensive","Claude uses Constitutional AI: trained with explicit principles rather than purely human feedback","Strengths: long context (200K tokens), nuanced writing, strong safety, excellent at following instructions","Weaknesses: can be overly cautious, smaller ecosystem than OpenAI, fewer multimodal features","Claude excels at document analysis, legal/medical text, and tasks requiring careful reasoning"]},
{w:"Week 3",t:"Google: Gemini and DeepMind",b:["Gemini 1.5 Pro offers up to 1 million token context — the largest commercially available","Natively multimodal: trained on text, images, audio, and video from the ground up","Strengths: massive context, strong multimodal performance, integration with Google ecosystem","Weaknesses: sometimes less precise than GPT-4 on complex reasoning, availability varies by region","Gemini is integrated into Google Workspace, Search, and Android — massive distribution advantage"]},
{w:"Week 3",t:"Open-Weight Models: Llama, Mistral, and Beyond",b:["Meta's Llama 3 (8B, 70B, 405B parameters) is free to download and run locally","Mistral models (7B, 8x7B Mixtral) punch above their weight — competitive with much larger models","Open-weight means you can inspect, modify, and deploy without API costs or data-sharing concerns","Trade-offs: requires technical setup, powerful hardware (GPU), and self-managed infrastructure","The open-source community rapidly fine-tunes these models for specialized tasks"]},
{w:"Week 3",t:"How to Evaluate and Compare Models",b:["Benchmarks: MMLU (knowledge), HumanEval (coding), HellaSwag (reasoning), MT-Bench (conversation)","Benchmarks have limitations: models can overfit to test sets, and scores do not capture real-world nuance","Practical evaluation: test your specific use case with multiple models using the same prompts","Consider: accuracy, speed, cost per token, context length, and alignment with your values","Leaderboards (Chatbot Arena, LMSYS) use human preference rankings — often more reliable than benchmarks"]},
{w:"Week 3",t:"Week 3 Summary and Key Takeaways",b:["The LLM landscape is competitive and evolving rapidly — today's rankings may shift in months","GPT-4 leads in ecosystem; Claude excels in safety and long documents; Gemini in multimodal and context","Open-weight models (Llama, Mistral) offer freedom, privacy, and no per-token cost","No single model dominates all tasks — effective users maintain familiarity with multiple options","Always evaluate models on your actual use cases, not just benchmark scores"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 3: The GenAI Ecosystem</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
