<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 8: Midterm Review & Exam</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 8",t:"Midterm Review: Course Overview",b:["Weeks 1-7 covered: AI history, LLM mechanics, model comparison, prompting, writing, and code applications","The midterm will test conceptual understanding, practical prompting skills, and critical evaluation","Format: multiple choice (40%), short answer (30%), practical prompt exercises (30%)","Review your weekly lab submissions — similar tasks will appear on the exam","Focus on understanding WHY techniques work, not just memorizing steps"]},
{w:"Week 8",t:"Review: AI Foundations (Weeks 1-2)",b:["Key timeline: Turing (1950) → Deep Learning (2012) → Transformers (2017) → ChatGPT (2022)","LLMs work by next-token prediction using transformer architecture with self-attention","Tokenization converts text to numbers; embeddings capture semantic meaning as vectors","Context windows define how much information a model can process at once","RLHF aligns raw language models to be helpful, harmless, and honest assistants"]},
{w:"Week 8",t:"Review: Models and Prompting (Weeks 3-5)",b:["Model landscape: GPT-4 (ecosystem), Claude (safety/long docs), Gemini (multimodal), Llama/Mistral (open)","Prompt anatomy: Role + Context + Task + Constraints + Output Format","Chain-of-thought improves reasoning; few-shot examples improve consistency","Temperature controls randomness; system prompts set persistent behavior","Prompt chaining breaks complex tasks into reliable, debuggable pipelines"]},
{w:"Week 8",t:"Review: Applications (Weeks 6-7)",b:["Writing: AI as collaborator for drafting, editing, summarization, extraction, and translation","Code: AI assists with generation, debugging, explanation, refactoring, and testing","Both domains require human oversight — AI augments but does not replace judgment","Effective workflows combine multiple prompts in sequence for complex tasks","Always verify AI outputs against your own knowledge and external sources"]},
{w:"Week 8",t:"Midterm Preparation Tips",b:["Practice writing prompts for specific tasks — the practical section requires hands-on skill","Review the difference between zero-shot, one-shot, and few-shot prompting with examples","Be able to explain transformer attention, tokenization, and embeddings in your own words","Understand the trade-offs between different models (open vs. closed, cost vs. capability)","Study your lab feedback — common mistakes in labs are common mistakes on exams"]},
{w:"Week 8",t:"What Is Coming in Weeks 9-15",b:["Ethics, bias, and fairness in AI systems (Week 9)","Academic integrity and institutional AI policies (Week 10)","Real-world industry applications across sectors (Week 11)","Limitations: hallucinations, reasoning failures, and knowledge cutoffs (Week 12)","The AI landscape, personal toolkit design, and course wrap-up (Weeks 13-15)"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 8: Midterm Review & Exam</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
