<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 13: Open vs Closed, Local vs Cloud</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 13",t:"Open vs. Closed Models",b:["Closed-source (proprietary): GPT-4, Claude, Gemini — access via API, no model weights available","Open-weight: Llama 3, Mistral, Falcon — model weights publicly available for download and modification","Open-weight does not mean open-source: training data and code may still be proprietary","Closed models lead on benchmarks but open models are closing the gap rapidly","Choice factors: data privacy, cost control, customization needs, and regulatory requirements"]},
{w:"Week 13",t:"Local vs. Cloud Deployment",b:["Cloud APIs: easy to start, always up-to-date, but data leaves your infrastructure","Local deployment: full data privacy, no per-token cost, but requires GPU hardware and technical setup","Tools for local: Ollama, LM Studio, llama.cpp, vLLM — make local deployment increasingly accessible","Hardware requirements: a 7B model runs on a laptop; 70B+ needs professional GPUs ($10K-40K)","Hybrid approaches: use local models for sensitive data and cloud APIs for general tasks"]},
{w:"Week 13",t:"Cost Economics of AI",b:["API pricing: GPT-4 costs ~$30/million input tokens; smaller models are 10-100x cheaper","Claude Haiku vs. Opus: 60x cost difference for the same API — capability tiers matter","Open models: zero per-token cost but significant infrastructure investment (hardware, electricity, maintenance)","For most individual users, API costs are modest ($5-50/month) — enterprise scale is where costs matter","The trend: prices are dropping rapidly — GPT-4 level capability today costs what GPT-3.5 cost at launch"]},
{w:"Week 13",t:"The Model Ecosystem: Specialized Tools",b:["Image generation: DALL-E 3, Midjourney, Stable Diffusion — each with different strengths and styles","Code-specific: GitHub Copilot, Cursor, Codeium — deeply integrated into development workflows","Search-augmented: Perplexity, Bing Chat, Google AI Overviews — combine LLMs with real-time web data","Voice and multimodal: GPT-4o voice, Gemini Live — real-time conversational AI with speech and vision","Embedding models: specialized for search, retrieval, and recommendation rather than generation"]},
{w:"Week 13",t:"Regulation and Policy Landscape",b:["EU AI Act (2024): risk-based framework classifying AI systems from minimal to unacceptable risk","US Executive Order on AI (2023): voluntary commitments from major AI companies, reporting requirements","China: requires AI-generated content to be labeled; restricts models that undermine 'socialist values'","Industry self-regulation: Anthropic, OpenAI, Google publish responsible use policies and safety reports","The regulatory landscape is fragmented globally — what is legal in one jurisdiction may not be in another"]},
{w:"Week 13",t:"Future Trends and Predictions",b:["Multimodal by default: future models will seamlessly handle text, images, audio, video, and code","AI agents: systems that can plan, use tools, browse the web, and complete multi-step tasks autonomously","Personalization: models fine-tuned to individual users' preferences, writing style, and knowledge","Smaller, faster models: efficiency improvements mean phone-capable models approaching current cloud quality","Democratization: AI capabilities becoming accessible to smaller organizations and individuals worldwide"]},
{w:"Week 13",t:"Week 13 Summary and Key Takeaways",b:["The choice between open/closed and local/cloud depends on your priorities: privacy, cost, capability, ease","AI costs are dropping rapidly but remain significant at enterprise scale — understanding pricing matters","Specialized tools often outperform general-purpose models for specific tasks","Regulation is evolving globally with different approaches — stay informed about applicable frameworks","The field is moving toward multimodal, agentic, personalized AI — prepare for continuous learning"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 13: Open vs Closed, Local vs Cloud</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
