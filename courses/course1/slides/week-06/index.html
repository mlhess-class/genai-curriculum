<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 6: AI for Writing & Analysis</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 6",t:"AI as a Writing Partner",b:["AI excels at drafting, editing, and restructuring text — treat it as a collaborative tool, not a replacement","Use AI for first drafts, then apply your expertise, voice, and judgment to refine","AI can match specific tones: academic, casual, professional, persuasive, technical","The best results come from iterative collaboration: draft → AI feedback → revision → AI polish","Always review AI-generated text critically — it may contain subtle errors or generic phrasing"]},
{w:"Week 6",t:"Summarization Techniques",b:["Extractive summarization: 'Pull out the 5 most important sentences from this document'","Abstractive summarization: 'Summarize this 20-page report in 3 paragraphs for a non-technical audience'","Hierarchical summaries: 'Provide a one-sentence summary, a one-paragraph summary, and a one-page summary'","Specify your audience: a summary for executives differs from one for engineers","For long documents, summarize sections first, then ask for a summary of summaries"]},
{w:"Week 6",t:"Information Extraction and Structuring",b:["Extract structured data from unstructured text: names, dates, amounts, relationships","Prompt pattern: 'From this email thread, extract: sender, action items, deadlines, and decisions made'","Output as JSON or tables for downstream processing and integration with other tools","Entity extraction: identify people, organizations, locations, and their relationships in text","AI can process hundreds of documents consistently — a task that would take humans days"]},
{w:"Week 6",t:"Translation and Cross-Language Tasks",b:["Modern LLMs handle 50+ languages with varying quality — best for major world languages","Translation goes beyond word-for-word: 'Translate this business email to Japanese, maintaining formal register'","Cross-language analysis: 'Summarize this French article in English' — two tasks in one prompt","Cultural adaptation: 'Adapt this marketing copy for a Brazilian Portuguese-speaking audience'","Limitations: less common languages, technical jargon, and cultural idioms may produce errors"]},
{w:"Week 6",t:"Editing, Proofreading, and Style Transfer",b:["Proofreading: 'Check this text for grammar, spelling, and punctuation errors. List each correction.'","Style transfer: 'Rewrite this academic paper abstract as a blog post for a general audience'","Tone adjustment: 'Make this email more diplomatic without changing the core message'","Structural editing: 'Reorganize these paragraphs for better logical flow and add transitions'","Comparative editing: 'Here are two drafts. Combine the strengths of both into a final version.'"]},
{w:"Week 6",t:"Building Analysis Workflows",b:["Combine extraction, summarization, and analysis into repeatable workflows","Example workflow: Upload document → Extract key claims → Fact-check each claim → Generate report","Use consistent prompt templates for recurring analysis tasks to ensure comparable results","Sentiment analysis: 'Analyze the tone of these customer reviews. Categorize as positive, negative, or neutral.'","SWOT analysis: 'Read this company report and generate a SWOT analysis with supporting evidence'"]},
{w:"Week 6",t:"Week 6 Summary and Key Takeaways",b:["AI is most effective as a writing collaborator — human judgment remains essential for quality","Summarization works best with clear audience and format specifications","Information extraction can transform unstructured text into structured, actionable data","Translation capabilities are strong for major languages but require verification for nuance","Build repeatable workflows for recurring tasks — consistency and efficiency compound over time"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 6: AI for Writing & Analysis</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
