<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 11: AI Across Industries</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 11",t:"AI in Healthcare",b:["Diagnostic assistance: AI matches or exceeds radiologists in detecting certain cancers from medical imaging","Drug discovery: AI models predict molecular interactions, reducing drug development timelines by years","Clinical documentation: AI scribes transcribe and summarize doctor-patient conversations in real time","Personalized medicine: AI analyzes genetic data to recommend tailored treatment plans","Challenges: FDA approval processes, liability for AI-assisted diagnoses, patient data privacy (HIPAA)"]},
{w:"Week 11",t:"AI in Law",b:["Legal research: AI searches and summarizes case law, statutes, and regulations in seconds vs. hours","Contract analysis: AI identifies key clauses, risks, and inconsistencies across thousands of documents","Predictive analytics: models estimate case outcomes based on historical data and judge patterns","Document drafting: AI generates first drafts of contracts, briefs, and legal memoranda","Risks: hallucinated case citations (lawyers have been sanctioned for citing AI-fabricated cases)"]},
{w:"Week 11",t:"AI in Finance",b:["Fraud detection: AI identifies unusual transaction patterns in real time across millions of transactions","Algorithmic trading: AI models analyze market data and execute trades at speeds impossible for humans","Risk assessment: AI evaluates creditworthiness using broader data than traditional credit scores","Customer service: AI chatbots handle routine banking queries, account inquiries, and dispute resolution","Regulatory concerns: explainability requirements (why was this loan denied?), market stability risks"]},
{w:"Week 11",t:"AI in Education",b:["Personalized tutoring: AI adapts to individual student pace, knowledge gaps, and learning styles","Automated grading: AI can grade essays with rubrics, providing instant feedback at scale","Content creation: AI generates practice problems, quizzes, and supplementary materials for any topic","Accessibility: AI transcribes lectures, translates materials, and generates alternative text for images","Concerns: over-reliance reducing critical thinking skills, equity of access, data privacy for minors"]},
{w:"Week 11",t:"AI in Creative Industries",b:["Content creation: AI assists with copywriting, social media content, and marketing campaign ideation","Image and video: DALL-E, Midjourney, and Stable Diffusion generate visual content from text descriptions","Music: AI tools compose background music, generate sound effects, and assist with music production","Gaming: AI generates game levels, NPC dialogue, and adaptive difficulty systems","Copyright and ownership: legal frameworks are still being established for AI-generated creative works"]},
{w:"Week 11",t:"Emerging Applications and Future Directions",b:["Scientific research: AI assists with literature review, hypothesis generation, and experimental design","Climate and energy: AI optimizes power grids, predicts weather patterns, and models climate scenarios","Manufacturing: AI-driven quality control, predictive maintenance, and supply chain optimization","Government: AI assists with policy analysis, public service delivery, and fraud detection in benefits programs","The trend: AI is becoming a general-purpose tool embedded across virtually every industry"]},
{w:"Week 11",t:"Week 11 Summary and Key Takeaways",b:["AI is transforming every major industry — healthcare, law, finance, education, and creative work","The most successful applications augment human expertise rather than attempting to replace it entirely","Each industry has specific risks: hallucinated legal citations, biased credit decisions, privacy violations","Regulatory frameworks are racing to keep up with deployment — expect significant policy changes","Understanding industry applications helps you identify where AI can add value in your own career"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 11: AI Across Industries</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
