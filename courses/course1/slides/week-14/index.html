<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 14: Building Your AI Toolkit</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 14",t:"Designing Your Personal AI Toolkit",b:["A personal AI toolkit is your curated set of AI tools, prompts, and workflows for your specific needs","No single tool does everything well — the goal is a complementary set covering your key use cases","Start with your top 5 recurring tasks and identify which AI tools handle each best","Consider: cost, privacy requirements, platform integration, and learning curve for each tool","Your toolkit will evolve — revisit and update it quarterly as new tools emerge and your needs change"]},
{w:"Week 14",t:"Choosing Your Primary LLM",b:["Pick one model to learn deeply rather than superficially using five — mastery beats breadth","For general use: ChatGPT Plus ($20/mo) or Claude Pro ($20/mo) cover most needs well","For budget-conscious users: free tiers of ChatGPT, Claude, and Gemini are surprisingly capable","For privacy-focused users: local models via Ollama or LM Studio keep all data on your device","For developers: API access (OpenAI, Anthropic) enables automation and custom integrations"]},
{w:"Week 14",t:"Building a Prompt Library",b:["A prompt library is a personal collection of tested, effective prompts for your recurring tasks","Categories: writing, analysis, coding, research, communication, decision-making, learning","Template pattern: include placeholders for variable content — [TOPIC], [AUDIENCE], [FORMAT]","Version your prompts: when you improve a prompt, note what changed and why","Share within your team or organization — institutional prompt libraries multiply productivity"]},
{w:"Week 14",t:"Workflow Integration Strategies",b:["Identify friction points in your current workflows where AI could save time or improve quality","Browser extensions: access AI directly while reading articles, writing emails, or researching","IDE integration: Copilot, Cursor, or Codeium for developers — AI in your coding environment","Automation: Zapier, Make, or custom scripts connecting AI APIs to your existing tools","Start with one workflow, measure the improvement, then expand — avoid the trap of adopting everything at once"]},
{w:"Week 14",t:"Evaluating New AI Tools",b:["New AI tools launch weekly — you need a framework for evaluation, not FOMO-driven adoption","Evaluation criteria: does it solve a real problem? Is it better than my current solution? What does it cost?","Trial method: test with 3-5 real tasks from your actual work before committing","Red flags: tools that require excessive permissions, lack clear privacy policies, or have no business model","The best tool is the one you actually use consistently — simplicity and reliability beat features"]},
{w:"Week 14",t:"Staying Current in a Fast-Moving Field",b:["Follow key sources: AI research blogs (Anthropic, OpenAI, Google DeepMind), newsletters, and podcasts","Communities: Reddit r/LocalLLaMA, Hacker News, Twitter/X AI community, Discord servers","Hands-on experimentation: try new models and tools yourself rather than relying solely on reviews","Focus on principles over products: understanding how LLMs work lets you adapt to any new tool","Set a learning budget: 1-2 hours per week is enough to stay informed without being overwhelmed"]},
{w:"Week 14",t:"Week 14 Summary and Key Takeaways",b:["Design your toolkit around your actual needs — not hype, not what influencers recommend","Master one primary LLM deeply before branching out to specialized tools","Build and maintain a prompt library — it is your most portable and valuable AI asset","Integrate AI into existing workflows incrementally — measure impact before expanding","Stay current through trusted sources and hands-on experimentation, with a sustainable time budget"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 14: Building Your AI Toolkit</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
