<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 12: Hallucinations & Limitations</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 12",t:"Hallucinations: When AI Makes Things Up",b:["Hallucination: AI generates confident, plausible-sounding information that is factually incorrect","LLMs predict probable text, not truthful text — they have no mechanism to verify their own claims","Examples: fabricated citations, invented statistics, non-existent people, and fictional historical events","Hallucination rates vary by model and topic — obscure subjects and specific facts are most vulnerable","Mitigation: always verify claims from AI against authoritative sources, especially for consequential decisions"]},
{w:"Week 12",t:"Reasoning Limitations",b:["LLMs struggle with multi-step logical reasoning, especially when steps depend on each other","Math: simple arithmetic can fail — GPT-4 can solve calculus but sometimes miscounts items in a list","Spatial reasoning: 'If I face north and turn left twice, which direction am I facing?' often gets wrong answers","Causal reasoning: AI identifies correlations but struggles to distinguish cause from effect","Planning: AI can outline steps but has difficulty evaluating whether a plan is actually feasible"]},
{w:"Week 12",t:"Knowledge Cutoffs and Temporal Limitations",b:["Models have a training data cutoff — they do not know about events after their last training update","GPT-4's initial cutoff was April 2023; Claude 3 was trained through early 2024","Retrieval-Augmented Generation (RAG) addresses this by fetching current information at query time","Web-connected models (Bing Chat, Perplexity) can access current information but may misinterpret it","Always check: 'When was this model's training data cutoff?' before asking about recent events"]},
{w:"Week 12",t:"Context Window Limitations",b:["Even with large context windows (200K+ tokens), models do not use all context equally","The 'lost in the middle' phenomenon: information in the middle of long contexts is often ignored","Models may contradict earlier parts of a conversation if the context grows too long","Summarization of very long documents may miss key details buried in the middle sections","Practical tip: put the most important information at the beginning and end of your prompt"]},
{w:"Week 12",t:"Overconfidence and Sycophancy",b:["AI models rarely express genuine uncertainty — they generate confident text even when unsure","Sycophancy: models tend to agree with the user rather than push back on incorrect assumptions","If you say 'I think X is true, right?' the model is biased toward confirming, even if X is false","Models may generate multiple contradictory answers if asked the same question different ways","Mitigation: ask the model to consider counterarguments, express confidence levels, and identify uncertainties"]},
{w:"Week 12",t:"Security and Adversarial Attacks",b:["Prompt injection: malicious inputs trick the model into ignoring its instructions or revealing system prompts","Jailbreaking: users craft prompts to bypass safety filters and extract harmful content","Data poisoning: adversaries can corrupt training data to introduce biases or backdoors","Model extraction: competitors can approximate a proprietary model through systematic API querying","These are active research areas — defenses improve, but new attack vectors are regularly discovered"]},
{w:"Week 12",t:"Week 12 Summary and Key Takeaways",b:["Hallucinations are inherent to probabilistic text generation — verification is always necessary","Reasoning limitations mean AI should assist, not replace, human judgment on complex logical tasks","Knowledge cutoffs require awareness of temporal limitations and use of retrieval augmentation","Models are overconfident and sycophantic by default — actively prompt for uncertainty and counterarguments","Understanding limitations is essential for responsible use — knowing what AI cannot do is as important as knowing what it can"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 12: Hallucinations & Limitations</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
