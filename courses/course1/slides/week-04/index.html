<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENAI 101 — Week 4: Prompt Engineering Fundamentals</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#00274C;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#root{width:100%;max-width:960px;padding:20px}
.slide-container{background:linear-gradient(135deg,#001a33 0%,#00274C 50%,#001a33 100%);border:1px solid #FFCB05;border-radius:12px;padding:48px;min-height:520px;display:flex;flex-direction:column;justify-content:flex-start;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.week-label{color:#FFCB05;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:#FFCB05;margin-bottom:28px;line-height:1.3;border-bottom:2px solid rgba(255,203,5,0.3);padding-bottom:12px}
.slide-bullets{list-style:none;flex:1}
.slide-bullets li{font-size:17px;line-height:1.6;margin-bottom:14px;padding-left:24px;position:relative;color:#d4d4d4}
.slide-bullets li::before{content:"\25B8";position:absolute;left:0;color:#FFCB05;font-size:14px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.controls button{background:#FFCB05;color:#00274C;border:none;padding:10px 24px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#ffd633;transform:translateY(-1px)}
.controls button:disabled{opacity:0.3;cursor:default;transform:none}
.slide-counter{color:#FFCB05;font-size:14px;font-weight:600}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;color:#FFCB05;font-weight:700}
.header p{color:#8899aa;font-size:13px;margin-top:4px}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#FFCB05;font-size:14px;text-decoration:none;opacity:0.7}
.back-link a:hover{opacity:1;text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const slides = [{w:"Week 4",t:"What Is Prompt Engineering?",b:["Prompt engineering is the practice of crafting inputs to get optimal outputs from AI models","It is the primary interface between humans and LLMs — your prompt is your program","Small changes in wording can dramatically change output quality and relevance","Prompt engineering is an empirical skill: you learn by testing, iterating, and observing patterns","This is arguably the most practical skill in the entire course — you will use it daily"]},
{w:"Week 4",t:"The Anatomy of an Effective Prompt",b:["Role: tell the model who it is ('You are an experienced data analyst...')","Context: provide relevant background information the model needs to respond well","Task: clearly state what you want the model to do — be specific and unambiguous","Constraints: set boundaries on format, length, tone, or content ('Respond in 3 bullet points')","Output format: specify exactly how you want the response structured (JSON, table, list, essay)"]},
{w:"Week 4",t:"Roles and Personas",b:["Assigning a role activates relevant knowledge patterns: 'You are a Harvard professor of economics'","Roles improve output quality because they narrow the distribution of likely responses","Effective roles are specific: 'senior Python developer with 10 years of Django experience'","You can combine roles with audience: 'Explain quantum computing as a kindergarten teacher would'","Experiment with different roles for the same question — results can vary significantly"]},
{w:"Week 4",t:"Providing Context Effectively",b:["Context reduces ambiguity: 'Summarize this article' is worse than pasting the full article and asking","Use delimiters to separate context from instructions: triple quotes, XML tags, or markdown headers","More context is generally better, up to the model's context window limit","Relevant context beats quantity: including irrelevant information can confuse the model","For recurring tasks, develop a context template you can fill in consistently"]},
{w:"Week 4",t:"Constraints and Formatting Instructions",b:["Length constraints: 'In exactly 3 sentences' or 'In 200 words or fewer'","Format constraints: 'Respond as a JSON object with keys: title, summary, tags'","Tone constraints: 'Use a professional but approachable tone suitable for a company blog'","Negative constraints: 'Do not use jargon' or 'Do not include code examples'","Constraints make outputs predictable and useful — especially important for automation"]},
{w:"Week 4",t:"Using Examples in Prompts",b:["Providing input/output examples (few-shot prompting) dramatically improves consistency","One example (one-shot) often suffices for simple formatting tasks","2-5 examples (few-shot) work well for classification, extraction, or transformation tasks","Examples teach by demonstration — the model infers the pattern from your examples","Make sure examples are representative and correct — the model will replicate errors too"]},
{w:"Week 4",t:"Common Prompt Mistakes",b:["Being too vague: 'Tell me about AI' produces generic responses; specify what aspect and depth","Not iterating: your first prompt is rarely your best — treat prompting as a conversation","Overloading: asking multiple unrelated questions in one prompt degrades quality on each","Ignoring output format: without format instructions, the model guesses — and often guesses wrong","Assuming the model knows your context: it only knows what you put in the prompt"]},
{w:"Week 4",t:"Week 4 Summary and Key Takeaways",b:["Effective prompts combine role, context, task, constraints, and output format specifications","Examples (few-shot) are one of the most powerful techniques for getting consistent outputs","Specificity beats verbosity — clear, precise prompts outperform long, vague ones","Prompt engineering is iterative: test, observe, refine, repeat","Start building your personal prompt library — collect prompts that work well for you"]}];

function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101 — Week 4: Prompt Engineering Fundamentals</h1>
        <p>University of Michigan &bull; Foundations of Generative AI</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
      <div className="back-link"><a href="../index.html">&larr; Full Slide Deck</a> &nbsp;|&nbsp; <a href="../../site/index.html">Course Home</a></div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
