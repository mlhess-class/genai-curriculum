<script type="text/babel">
const slides = [// Week 1: What is AI?
{w:"Week 1",t:"Welcome to GENAI 101",b:["This course covers the foundations of generative AI — what it is, how it works, and how to use it effectively","No prior programming or AI experience required; curiosity is the only prerequisite","You will learn to evaluate, prompt, and critically assess AI systems","By the end, you will have a personal AI toolkit and a framework for ethical use","Grading: participation (20%), weekly labs (30%), midterm (20%), final project (30%)"]},
{w:"Week 1",t:"What Is Artificial Intelligence?",b:["AI is the field of computer science focused on creating systems that perform tasks typically requiring human intelligence","Narrow AI: systems that excel at one specific task (chess, image recognition, language translation)","General AI (AGI): hypothetical systems with human-level reasoning across all domains — does not yet exist","Generative AI: a subset of AI that creates new content — text, images, code, music, video","Key distinction: traditional software follows explicit rules; AI systems learn patterns from data"]},
{w:"Week 1",t:"A Brief History of AI: 1950–2010",b:["1950: Alan Turing proposes the Turing Test — can a machine fool a human into thinking it is human?","1956: Dartmouth Conference coins the term 'Artificial Intelligence' as a field of study","1960s–80s: Expert systems and symbolic AI — hand-coded rules, limited scalability","1997: IBM Deep Blue defeats world chess champion Garry Kasparov","2000s: Machine learning gains traction — statistical methods outperform hand-crafted rules"]},
{w:"Week 1",t:"The Deep Learning Revolution: 2012–2020",b:["2012: AlexNet wins ImageNet competition, proving deep neural networks can dominate computer vision","2014: Generative Adversarial Networks (GANs) introduced — two networks compete to generate realistic images","2016: DeepMind's AlphaGo defeats world Go champion Lee Sedol, a game thought too complex for AI","2017: Google publishes 'Attention Is All You Need' — the Transformer architecture changes everything","2018: OpenAI releases GPT-1; BERT from Google revolutionizes natural language understanding"]},
{w:"Week 1",t:"The Generative AI Explosion: 2020–Present",b:["2020: GPT-3 demonstrates that scaling language models produces emergent capabilities","2022: ChatGPT launches and reaches 100 million users in two months — fastest adoption in tech history","2023: GPT-4, Claude, Gemini, and Llama push capabilities further; multimodal AI goes mainstream","2024: AI agents, real-time voice, video generation (Sora), and enterprise adoption accelerate","The pace of change is unprecedented — models improve every few months, not every few years"]},
{w:"Week 1",t:"Key Concepts: Models, Training, and Inference",b:["A model is a mathematical function with billions of parameters learned from data","Training: the process of adjusting parameters by exposing the model to massive datasets","Inference: using a trained model to generate predictions or outputs for new inputs","Parameters are like knobs — during training, the system tunes billions of knobs to minimize errors","The training data shapes what the model knows, its biases, and its limitations"]},
{w:"Week 1",t:"Week 1 Summary and Key Takeaways",b:["AI is a broad field; generative AI is the subset that creates new content from learned patterns","The field evolved from rule-based systems to statistical learning to deep neural networks","Transformers (2017) are the architecture behind modern LLMs like GPT, Claude, and Gemini","ChatGPT (2022) was the inflection point that brought generative AI to the mainstream","This course will make you a critical, effective user of these tools — not just a passive consumer"]},// Week 2: How LLMs Work
{w:"Week 2",t:"What Is a Large Language Model (LLM)?",b:["An LLM is a neural network trained on massive text datasets to predict the next token in a sequence","'Large' refers to parameter count: GPT-4 has over 1 trillion parameters; even 'small' models have billions","LLMs are foundation models — trained generally, then adapted to specific tasks via prompting or fine-tuning","They do not 'understand' language the way humans do; they model statistical patterns in text","Despite this, emergent behaviors arise at scale: reasoning, translation, coding, and creative writing"]},
{w:"Week 2",t:"Tokenization: How Text Becomes Numbers",b:["Computers process numbers, not words — tokenization converts text into numerical tokens","A token is typically a word piece: 'unhappiness' might become ['un', 'happi', 'ness']","Common words are single tokens; rare words get split into subword pieces","GPT-4 uses ~100,000 token vocabulary; the average English word is about 1.3 tokens","Token limits matter: a model with a 128K context window can process ~96,000 words at once"]},
{w:"Week 2",t:"Embeddings: Meaning as Geometry",b:["Each token is mapped to a high-dimensional vector (embedding) that captures semantic meaning","Similar concepts cluster together: 'king' and 'queen' are closer than 'king' and 'banana'","The famous example: vector('king') - vector('man') + vector('woman') ≈ vector('queen')","Embeddings are learned during training — the model discovers relationships, not a human programmer","These vectors have hundreds or thousands of dimensions, capturing nuances humans cannot visualize"]},
{w:"Week 2",t:"The Transformer Architecture",b:["Transformers process all tokens in a sequence simultaneously (parallel), unlike older sequential models","Self-attention is the key mechanism: each token 'attends' to every other token to understand context","'The bank by the river' vs 'The bank approved my loan' — attention resolves 'bank' differently","Multi-head attention runs multiple attention patterns in parallel, capturing different relationships","Layer by layer, the model builds increasingly abstract representations of meaning"]},
{w:"Week 2",t:"How Text Generation Works",b:["Generation is autoregressive: the model predicts one token at a time, then feeds it back as input","At each step, the model outputs a probability distribution over all possible next tokens","Temperature controls randomness: low temperature (0.0) = deterministic; high (1.0+) = creative/random","Top-p (nucleus sampling) limits choices to tokens whose cumulative probability exceeds a threshold","The model has no memory between conversations — each prompt is processed independently"]},
{w:"Week 2",t:"Context Windows and Attention",b:["The context window is the maximum number of tokens a model can process in one interaction","GPT-4 Turbo: 128K tokens; Claude 3: 200K tokens; Gemini 1.5 Pro: up to 1M tokens","Longer context windows allow processing entire books, codebases, or lengthy conversations","Attention cost scales quadratically with sequence length — longer contexts are more expensive","In practice, models may lose focus on middle sections of very long contexts ('lost in the middle')"]},
{w:"Week 2",t:"Pre-training, Fine-tuning, and RLHF",b:["Pre-training: model learns language patterns from trillions of tokens scraped from the internet","Fine-tuning: model is further trained on curated datasets for specific tasks or behaviors","RLHF (Reinforcement Learning from Human Feedback): humans rate outputs to align the model","RLHF is why ChatGPT feels helpful and safe — it was trained to prefer helpful, harmless responses","Constitutional AI (Anthropic/Claude) uses AI-generated feedback guided by explicit principles"]},
{w:"Week 2",t:"Week 2 Summary and Key Takeaways",b:["LLMs convert text to tokens, embed them as vectors, and use attention to model relationships","Generation is probabilistic next-token prediction — not retrieval or rule-following","Temperature and top-p control the creativity vs. determinism tradeoff","Context windows define how much information the model can consider at once","RLHF and fine-tuning shape model behavior from raw language modeling to helpful assistant"]},// Week 3: Comparing Models
{w:"Week 3",t:"The Current LLM Landscape",b:["The AI model ecosystem is diverse: proprietary (closed-source) and open-weight models coexist","Major players: OpenAI (GPT), Anthropic (Claude), Google (Gemini), Meta (Llama), Mistral","Models differ in capabilities, pricing, context window, speed, and alignment approaches","No single model is best at everything — the right choice depends on your specific use case","Benchmarks exist but are imperfect; real-world testing is essential for evaluation"]},
{w:"Week 3",t:"OpenAI: GPT-4 and the GPT Family",b:["GPT-4 (2023) set the standard for reasoning, coding, and multimodal understanding","GPT-4 Turbo offers 128K context at lower cost; GPT-4o adds faster responses and native vision","Strengths: strong reasoning, coding, broad knowledge, large developer ecosystem","Weaknesses: closed-source, expensive at scale, occasional over-refusal on edge cases","OpenAI also offers DALL-E (images), Whisper (speech), and an extensive API platform"]},
{w:"Week 3",t:"Anthropic: Claude and Constitutional AI",b:["Claude 3 family (Haiku, Sonnet, Opus) spans fast/cheap to powerful/expensive","Claude uses Constitutional AI: trained with explicit principles rather than purely human feedback","Strengths: long context (200K tokens), nuanced writing, strong safety, excellent at following instructions","Weaknesses: can be overly cautious, smaller ecosystem than OpenAI, fewer multimodal features","Claude excels at document analysis, legal/medical text, and tasks requiring careful reasoning"]},
{w:"Week 3",t:"Google: Gemini and DeepMind",b:["Gemini 1.5 Pro offers up to 1 million token context — the largest commercially available","Natively multimodal: trained on text, images, audio, and video from the ground up","Strengths: massive context, strong multimodal performance, integration with Google ecosystem","Weaknesses: sometimes less precise than GPT-4 on complex reasoning, availability varies by region","Gemini is integrated into Google Workspace, Search, and Android — massive distribution advantage"]},
{w:"Week 3",t:"Open-Weight Models: Llama, Mistral, and Beyond",b:["Meta's Llama 3 (8B, 70B, 405B parameters) is free to download and run locally","Mistral models (7B, 8x7B Mixtral) punch above their weight — competitive with much larger models","Open-weight means you can inspect, modify, and deploy without API costs or data-sharing concerns","Trade-offs: requires technical setup, powerful hardware (GPU), and self-managed infrastructure","The open-source community rapidly fine-tunes these models for specialized tasks"]},
{w:"Week 3",t:"How to Evaluate and Compare Models",b:["Benchmarks: MMLU (knowledge), HumanEval (coding), HellaSwag (reasoning), MT-Bench (conversation)","Benchmarks have limitations: models can overfit to test sets, and scores do not capture real-world nuance","Practical evaluation: test your specific use case with multiple models using the same prompts","Consider: accuracy, speed, cost per token, context length, and alignment with your values","Leaderboards (Chatbot Arena, LMSYS) use human preference rankings — often more reliable than benchmarks"]},
{w:"Week 3",t:"Week 3 Summary and Key Takeaways",b:["The LLM landscape is competitive and evolving rapidly — today's rankings may shift in months","GPT-4 leads in ecosystem; Claude excels in safety and long documents; Gemini in multimodal and context","Open-weight models (Llama, Mistral) offer freedom, privacy, and no per-token cost","No single model dominates all tasks — effective users maintain familiarity with multiple options","Always evaluate models on your actual use cases, not just benchmark scores"]},// Week 4: Prompt Engineering Basics
{w:"Week 4",t:"What Is Prompt Engineering?",b:["Prompt engineering is the practice of crafting inputs to get optimal outputs from AI models","It is the primary interface between humans and LLMs — your prompt is your program","Small changes in wording can dramatically change output quality and relevance","Prompt engineering is an empirical skill: you learn by testing, iterating, and observing patterns","This is arguably the most practical skill in the entire course — you will use it daily"]},
{w:"Week 4",t:"The Anatomy of an Effective Prompt",b:["Role: tell the model who it is ('You are an experienced data analyst...')","Context: provide relevant background information the model needs to respond well","Task: clearly state what you want the model to do — be specific and unambiguous","Constraints: set boundaries on format, length, tone, or content ('Respond in 3 bullet points')","Output format: specify exactly how you want the response structured (JSON, table, list, essay)"]},
{w:"Week 4",t:"Roles and Personas",b:["Assigning a role activates relevant knowledge patterns: 'You are a Harvard professor of economics'","Roles improve output quality because they narrow the distribution of likely responses","Effective roles are specific: 'senior Python developer with 10 years of Django experience'","You can combine roles with audience: 'Explain quantum computing as a kindergarten teacher would'","Experiment with different roles for the same question — results can vary significantly"]},
{w:"Week 4",t:"Providing Context Effectively",b:["Context reduces ambiguity: 'Summarize this article' is worse than pasting the full article and asking","Use delimiters to separate context from instructions: triple quotes, XML tags, or markdown headers","More context is generally better, up to the model's context window limit","Relevant context beats quantity: including irrelevant information can confuse the model","For recurring tasks, develop a context template you can fill in consistently"]},
{w:"Week 4",t:"Constraints and Formatting Instructions",b:["Length constraints: 'In exactly 3 sentences' or 'In 200 words or fewer'","Format constraints: 'Respond as a JSON object with keys: title, summary, tags'","Tone constraints: 'Use a professional but approachable tone suitable for a company blog'","Negative constraints: 'Do not use jargon' or 'Do not include code examples'","Constraints make outputs predictable and useful — especially important for automation"]},
{w:"Week 4",t:"Using Examples in Prompts",b:["Providing input/output examples (few-shot prompting) dramatically improves consistency","One example (one-shot) often suffices for simple formatting tasks","2-5 examples (few-shot) work well for classification, extraction, or transformation tasks","Examples teach by demonstration — the model infers the pattern from your examples","Make sure examples are representative and correct — the model will replicate errors too"]},
{w:"Week 4",t:"Common Prompt Mistakes",b:["Being too vague: 'Tell me about AI' produces generic responses; specify what aspect and depth","Not iterating: your first prompt is rarely your best — treat prompting as a conversation","Overloading: asking multiple unrelated questions in one prompt degrades quality on each","Ignoring output format: without format instructions, the model guesses — and often guesses wrong","Assuming the model knows your context: it only knows what you put in the prompt"]},
{w:"Week 4",t:"Week 4 Summary and Key Takeaways",b:["Effective prompts combine role, context, task, constraints, and output format specifications","Examples (few-shot) are one of the most powerful techniques for getting consistent outputs","Specificity beats verbosity — clear, precise prompts outperform long, vague ones","Prompt engineering is iterative: test, observe, refine, repeat","Start building your personal prompt library — collect prompts that work well for you"]},// Week 5: Advanced Prompting
{w:"Week 5",t:"Chain-of-Thought (CoT) Prompting",b:["CoT prompting asks the model to show its reasoning step by step before giving a final answer","Simply adding 'Let's think step by step' can improve accuracy on math and logic problems by 20-40%","CoT works because it forces the model to allocate computation to intermediate reasoning steps","For complex problems, explicitly outline the steps: 'First analyze X, then consider Y, finally conclude Z'","CoT is especially effective for math, logic puzzles, multi-step analysis, and planning tasks"]},
{w:"Week 5",t:"Few-Shot and Zero-Shot Strategies",b:["Zero-shot: no examples provided — relies entirely on the model's training and your instructions","One-shot: a single example sets the pattern for format and style","Few-shot (2-5 examples): provides enough variation for the model to generalize the pattern","The optimal number of examples depends on task complexity and how unusual the desired format is","For novel or unusual tasks, more examples help; for common tasks, zero-shot with clear instructions suffices"]},
{w:"Week 5",t:"System Prompts and Message Roles",b:["API-based interactions use three message roles: system, user, and assistant","System prompt sets persistent instructions: persona, rules, format, and behavioral guidelines","System prompts are processed once and influence all subsequent user/assistant exchanges","Effective system prompts: 'You are a legal assistant. Always cite relevant statutes. Never give definitive legal advice.'","In ChatGPT, custom instructions serve a similar purpose to system prompts"]},
{w:"Week 5",t:"Temperature, Top-p, and Sampling Parameters",b:["Temperature (0.0–2.0): controls randomness in token selection during generation","Temperature 0: always picks the most probable token — deterministic, focused, repetitive","Temperature 0.7-1.0: balanced creativity — good for writing, brainstorming, conversation","Top-p (nucleus sampling): only considers tokens whose cumulative probability exceeds the threshold","In practice, adjust temperature OR top-p, not both — they serve similar purposes"]},
{w:"Week 5",t:"Prompt Chaining and Decomposition",b:["Complex tasks benefit from being broken into a pipeline of simpler prompts","Example: (1) Extract key facts → (2) Analyze implications → (3) Generate recommendations","Each step's output becomes the next step's input — like a relay race for AI reasoning","Chaining improves reliability: each step is simpler, so each step is more likely to be correct","This approach also makes debugging easier — you can identify which step went wrong"]},
{w:"Week 5",t:"Self-Consistency and Verification Prompts",b:["Ask the model to generate multiple answers and pick the most common one (majority voting)","Verification prompt: 'Now review your answer and check for errors or inconsistencies'","Ask the model to argue against its own answer: 'What are the strongest counterarguments?'","Meta-prompting: 'Rate your confidence in this answer from 1-10 and explain why'","These techniques catch errors that single-pass generation misses"]},
{w:"Week 5",t:"Week 5 Summary and Key Takeaways",b:["Chain-of-thought prompting significantly improves reasoning by making thinking explicit","System prompts provide persistent behavioral guidelines across a conversation","Temperature and top-p control the creativity/determinism tradeoff in generation","Prompt chaining decomposes complex tasks into reliable, debuggable pipelines","Self-consistency and verification techniques reduce errors — always verify important outputs"]},// Week 6: AI for Writing and Analysis
{w:"Week 6",t:"AI as a Writing Partner",b:["AI excels at drafting, editing, and restructuring text — treat it as a collaborative tool, not a replacement","Use AI for first drafts, then apply your expertise, voice, and judgment to refine","AI can match specific tones: academic, casual, professional, persuasive, technical","The best results come from iterative collaboration: draft → AI feedback → revision → AI polish","Always review AI-generated text critically — it may contain subtle errors or generic phrasing"]},
{w:"Week 6",t:"Summarization Techniques",b:["Extractive summarization: 'Pull out the 5 most important sentences from this document'","Abstractive summarization: 'Summarize this 20-page report in 3 paragraphs for a non-technical audience'","Hierarchical summaries: 'Provide a one-sentence summary, a one-paragraph summary, and a one-page summary'","Specify your audience: a summary for executives differs from one for engineers","For long documents, summarize sections first, then ask for a summary of summaries"]},
{w:"Week 6",t:"Information Extraction and Structuring",b:["Extract structured data from unstructured text: names, dates, amounts, relationships","Prompt pattern: 'From this email thread, extract: sender, action items, deadlines, and decisions made'","Output as JSON or tables for downstream processing and integration with other tools","Entity extraction: identify people, organizations, locations, and their relationships in text","AI can process hundreds of documents consistently — a task that would take humans days"]},
{w:"Week 6",t:"Translation and Cross-Language Tasks",b:["Modern LLMs handle 50+ languages with varying quality — best for major world languages","Translation goes beyond word-for-word: 'Translate this business email to Japanese, maintaining formal register'","Cross-language analysis: 'Summarize this French article in English' — two tasks in one prompt","Cultural adaptation: 'Adapt this marketing copy for a Brazilian Portuguese-speaking audience'","Limitations: less common languages, technical jargon, and cultural idioms may produce errors"]},
{w:"Week 6",t:"Editing, Proofreading, and Style Transfer",b:["Proofreading: 'Check this text for grammar, spelling, and punctuation errors. List each correction.'","Style transfer: 'Rewrite this academic paper abstract as a blog post for a general audience'","Tone adjustment: 'Make this email more diplomatic without changing the core message'","Structural editing: 'Reorganize these paragraphs for better logical flow and add transitions'","Comparative editing: 'Here are two drafts. Combine the strengths of both into a final version.'"]},
{w:"Week 6",t:"Building Analysis Workflows",b:["Combine extraction, summarization, and analysis into repeatable workflows","Example workflow: Upload document → Extract key claims → Fact-check each claim → Generate report","Use consistent prompt templates for recurring analysis tasks to ensure comparable results","Sentiment analysis: 'Analyze the tone of these customer reviews. Categorize as positive, negative, or neutral.'","SWOT analysis: 'Read this company report and generate a SWOT analysis with supporting evidence'"]},
{w:"Week 6",t:"Week 6 Summary and Key Takeaways",b:["AI is most effective as a writing collaborator — human judgment remains essential for quality","Summarization works best with clear audience and format specifications","Information extraction can transform unstructured text into structured, actionable data","Translation capabilities are strong for major languages but require verification for nuance","Build repeatable workflows for recurring tasks — consistency and efficiency compound over time"]},// Week 7: AI for Code
{w:"Week 7",t:"AI-Assisted Code Generation",b:["AI can generate functional code from natural language descriptions across most programming languages","Best practice: describe WHAT you want, specify the language, and include constraints (no external libraries, etc.)","AI-generated code should always be reviewed, tested, and understood before deployment","Tools: GitHub Copilot (inline), ChatGPT/Claude (conversational), Cursor (AI-native IDE)","Start simple: ask for a function, test it, then build up to more complex programs"]},
{w:"Week 7",t:"Debugging with AI",b:["Paste error messages and code — AI excels at identifying common bugs and suggesting fixes","Provide the full error traceback, the relevant code, and what you expected to happen","AI can explain cryptic error messages in plain English: 'Explain this error like I am a beginner'","For complex bugs, describe the expected vs. actual behavior and ask for diagnostic steps","Rubber duck debugging enhanced: explaining your problem to AI often reveals the solution"]},
{w:"Week 7",t:"Code Explanation and Documentation",b:["AI can explain unfamiliar code line by line: 'Explain what this regex does in plain English'","Generate docstrings, comments, and README files from existing code","Translate between languages: 'Convert this Python function to JavaScript'","Explain architectural patterns: 'Why does this codebase use the repository pattern?'","For legacy code, AI can help understand and document systems that lack documentation"]},
{w:"Week 7",t:"Code Refactoring and Optimization",b:["AI can suggest cleaner, more efficient, or more idiomatic versions of your code","Prompt: 'Refactor this function to use list comprehensions and reduce nesting'","Performance optimization: 'This function is slow with large inputs. Suggest optimizations.'","Security review: 'Check this code for common security vulnerabilities (SQL injection, XSS, etc.)'","AI catches patterns a tired human might miss — but it can also introduce subtle bugs"]},
{w:"Week 7",t:"Testing and Test Generation",b:["AI can generate unit tests from function signatures and descriptions","Prompt: 'Write pytest tests for this function, including edge cases and error handling'","Test-driven development with AI: write tests first, then ask AI to implement the function","AI can suggest edge cases you might not think of: boundary values, empty inputs, concurrent access","Always run the generated tests — AI may write tests that look right but test the wrong behavior"]},
{w:"Week 7",t:"Limitations of AI-Generated Code",b:["AI does not execute code — it predicts plausible code based on training patterns","It may generate code that looks correct but has subtle logical errors","Security vulnerabilities may be introduced if you do not review carefully","AI code may use deprecated APIs, outdated libraries, or non-existent functions (hallucination)","For production systems, AI-generated code should go through the same review process as human code"]},
{w:"Week 7",t:"Week 7 Summary and Key Takeaways",b:["AI is a powerful coding assistant for generation, debugging, explanation, and refactoring","Always review, test, and understand AI-generated code — never deploy blindly","The best workflow: describe intent clearly, review output critically, test thoroughly","AI-assisted coding makes experienced developers faster and helps beginners learn","Understanding what AI can and cannot do with code is itself a valuable professional skill"]},// Week 8: Midterm Review
{w:"Week 8",t:"Midterm Review: Course Overview",b:["Weeks 1-7 covered: AI history, LLM mechanics, model comparison, prompting, writing, and code applications","The midterm will test conceptual understanding, practical prompting skills, and critical evaluation","Format: multiple choice (40%), short answer (30%), practical prompt exercises (30%)","Review your weekly lab submissions — similar tasks will appear on the exam","Focus on understanding WHY techniques work, not just memorizing steps"]},
{w:"Week 8",t:"Review: AI Foundations (Weeks 1-2)",b:["Key timeline: Turing (1950) → Deep Learning (2012) → Transformers (2017) → ChatGPT (2022)","LLMs work by next-token prediction using transformer architecture with self-attention","Tokenization converts text to numbers; embeddings capture semantic meaning as vectors","Context windows define how much information a model can process at once","RLHF aligns raw language models to be helpful, harmless, and honest assistants"]},
{w:"Week 8",t:"Review: Models and Prompting (Weeks 3-5)",b:["Model landscape: GPT-4 (ecosystem), Claude (safety/long docs), Gemini (multimodal), Llama/Mistral (open)","Prompt anatomy: Role + Context + Task + Constraints + Output Format","Chain-of-thought improves reasoning; few-shot examples improve consistency","Temperature controls randomness; system prompts set persistent behavior","Prompt chaining breaks complex tasks into reliable, debuggable pipelines"]},
{w:"Week 8",t:"Review: Applications (Weeks 6-7)",b:["Writing: AI as collaborator for drafting, editing, summarization, extraction, and translation","Code: AI assists with generation, debugging, explanation, refactoring, and testing","Both domains require human oversight — AI augments but does not replace judgment","Effective workflows combine multiple prompts in sequence for complex tasks","Always verify AI outputs against your own knowledge and external sources"]},
{w:"Week 8",t:"Midterm Preparation Tips",b:["Practice writing prompts for specific tasks — the practical section requires hands-on skill","Review the difference between zero-shot, one-shot, and few-shot prompting with examples","Be able to explain transformer attention, tokenization, and embeddings in your own words","Understand the trade-offs between different models (open vs. closed, cost vs. capability)","Study your lab feedback — common mistakes in labs are common mistakes on exams"]},
{w:"Week 8",t:"What Is Coming in Weeks 9-15",b:["Ethics, bias, and fairness in AI systems (Week 9)","Academic integrity and institutional AI policies (Week 10)","Real-world industry applications across sectors (Week 11)","Limitations: hallucinations, reasoning failures, and knowledge cutoffs (Week 12)","The AI landscape, personal toolkit design, and course wrap-up (Weeks 13-15)"]},// Week 9: Ethics
{w:"Week 9",t:"Why AI Ethics Matters",b:["AI systems make or influence decisions affecting millions — hiring, lending, healthcare, criminal justice","Unlike traditional software, AI behavior emerges from data patterns that may encode societal biases","The speed of AI deployment outpaces regulation — ethical frameworks must be built proactively","AI ethics is not abstract philosophy — it directly impacts real people's lives and opportunities","As AI practitioners, you have a professional responsibility to consider the impact of the tools you use"]},
{w:"Week 9",t:"Bias in AI Systems",b:["Training data reflects historical biases: if past hiring data favored men, the AI will too","Amazon scrapped an AI hiring tool in 2018 after discovering it penalized resumes containing the word 'women's'","Representation bias: underrepresented groups in training data get worse model performance","Measurement bias: using proxy variables (zip code for race) can encode discrimination indirectly","Bias is not just a technical problem — it requires diverse teams, auditing, and ongoing monitoring"]},
{w:"Week 9",t:"Fairness: Definitions and Trade-offs",b:["Individual fairness: similar people should receive similar predictions or outcomes","Group fairness: outcomes should be equivalent across protected groups (race, gender, age)","These definitions can mathematically conflict — you cannot always satisfy all fairness criteria simultaneously","Disparate impact: a neutral-seeming criterion that disproportionately affects a protected group","Context matters: what counts as 'fair' in medical diagnosis differs from criminal sentencing"]},
{w:"Week 9",t:"Transparency and Explainability",b:["LLMs are 'black boxes' — even their creators cannot fully explain why they produce specific outputs","Explainability: can you understand WHY the model made a particular prediction or recommendation?","The 'right to explanation' is increasingly enshrined in law (EU AI Act, GDPR Article 22)","Techniques: attention visualization, feature importance, counterfactual explanations","Trade-off: more powerful models (deep learning) tend to be less interpretable than simpler ones"]},
{w:"Week 9",t:"Accountability and Governance",b:["When AI makes a harmful decision, who is responsible? The developer? The deployer? The user?","Current legal frameworks struggle with AI accountability — liability is often unclear","AI governance frameworks: NIST AI RMF, EU AI Act, IEEE Ethically Aligned Design","Organizations need AI review boards, impact assessments, and clear escalation procedures","Documentation matters: model cards, datasheets for datasets, and audit trails enable accountability"]},
{w:"Week 9",t:"Environmental and Labor Impact",b:["Training GPT-4 is estimated to have cost $100M+ in compute and significant energy consumption","A single ChatGPT query uses ~10x the energy of a Google search","AI training relies on human labelers — often low-paid workers in developing countries","Content moderation for AI safety has documented psychological harm to workers reviewing toxic content","The environmental and human costs of AI should factor into decisions about when and how to use it"]},
{w:"Week 9",t:"Week 9 Summary and Key Takeaways",b:["AI systems can perpetuate and amplify existing societal biases present in training data","Fairness has multiple valid definitions that can conflict — context determines the right approach","Transparency and explainability are both ethical requirements and increasingly legal requirements","Accountability frameworks are still evolving — documentation and governance structures are essential","Every AI user shares responsibility for ethical use — not just AI developers and companies"]},// Week 10: Academic Integrity
{w:"Week 10",t:"AI and Academic Integrity: The New Landscape",b:["AI tools have fundamentally changed what 'original work' means in academic contexts","Universities are rapidly developing AI policies — but there is no consensus yet","The spectrum ranges from complete bans to full integration with disclosure requirements","This is not just about cheating — it is about developing genuine understanding and skills","Your responsibility: know your institution's policy AND develop your own ethical framework"]},
{w:"Week 10",t:"University AI Policies: A Spectrum",b:["Restrictive: no AI use permitted on any assignments (increasingly rare and hard to enforce)","Permitted with disclosure: AI use allowed if you document what tools you used and how","Encouraged with guidelines: AI integrated into coursework with specific usage frameworks","Course-specific: policies vary by instructor — always check the syllabus and ask if unclear","The trend is toward integration with transparency — most universities are adopting disclosure-based policies"]},
{w:"Week 10",t:"What Constitutes AI-Assisted vs. AI-Generated Work?",b:["AI-assisted: you use AI for brainstorming, outlining, or checking grammar — the ideas and writing are yours","AI-generated: the substantive content, arguments, or text come primarily from AI output","The gray area is large: using AI to rephrase your ideas, expand your outline, or suggest counterarguments","A useful test: can you explain and defend every claim in your submission without the AI?","Documentation tip: keep a log of your AI interactions for each assignment — screenshots help"]},
{w:"Week 10",t:"Detection Tools and Their Limitations",b:["AI detection tools (GPTZero, Turnitin AI, Originality.ai) analyze text for statistical AI patterns","Current accuracy is imperfect: false positives wrongly accuse human writers, especially non-native English speakers","False negatives: paraphrasing, mixing AI and human text, or using less common models evades detection","Detection tools should not be the sole basis for academic integrity decisions","The arms race: as detection improves, so do methods to evade detection — trust and education work better"]},
{w:"Week 10",t:"Developing Your Own AI Ethics Framework",b:["Ask yourself: am I learning what this assignment is designed to teach me?","The 'explain it' test: if you cannot explain your work in a follow-up conversation, AI did too much","Use AI to learn, not to bypass learning — there is a meaningful difference","Consider your future self: skills you skip developing now become gaps in your professional capability","Build habits of intellectual honesty now — they compound throughout your career"]},
{w:"Week 10",t:"Best Practices for Ethical AI Use in Academics",b:["Always check course-specific AI policies before using AI tools on assignments","Disclose AI use proactively — transparency builds trust and protects you from accusations","Use AI as a learning accelerator: ask it to explain concepts, generate practice problems, check your reasoning","Keep records of your AI interactions — this protects you and helps you reflect on your process","When in doubt, ask your instructor — they would rather clarify expectations than handle integrity violations"]},
{w:"Week 10",t:"Week 10 Summary and Key Takeaways",b:["AI policies are evolving rapidly — stay informed about your institution's current stance","The key distinction is whether AI is helping you learn or replacing your learning","Detection tools are imperfect — transparency and education are more effective than surveillance","Develop a personal framework: ask 'am I learning?' and 'can I explain and defend this work?'","Ethical AI use is a professional skill — the habits you build now carry into your career"]},// Week 11: Industry Applications
{w:"Week 11",t:"AI in Healthcare",b:["Diagnostic assistance: AI matches or exceeds radiologists in detecting certain cancers from medical imaging","Drug discovery: AI models predict molecular interactions, reducing drug development timelines by years","Clinical documentation: AI scribes transcribe and summarize doctor-patient conversations in real time","Personalized medicine: AI analyzes genetic data to recommend tailored treatment plans","Challenges: FDA approval processes, liability for AI-assisted diagnoses, patient data privacy (HIPAA)"]},
{w:"Week 11",t:"AI in Law",b:["Legal research: AI searches and summarizes case law, statutes, and regulations in seconds vs. hours","Contract analysis: AI identifies key clauses, risks, and inconsistencies across thousands of documents","Predictive analytics: models estimate case outcomes based on historical data and judge patterns","Document drafting: AI generates first drafts of contracts, briefs, and legal memoranda","Risks: hallucinated case citations (lawyers have been sanctioned for citing AI-fabricated cases)"]},
{w:"Week 11",t:"AI in Finance",b:["Fraud detection: AI identifies unusual transaction patterns in real time across millions of transactions","Algorithmic trading: AI models analyze market data and execute trades at speeds impossible for humans","Risk assessment: AI evaluates creditworthiness using broader data than traditional credit scores","Customer service: AI chatbots handle routine banking queries, account inquiries, and dispute resolution","Regulatory concerns: explainability requirements (why was this loan denied?), market stability risks"]},
{w:"Week 11",t:"AI in Education",b:["Personalized tutoring: AI adapts to individual student pace, knowledge gaps, and learning styles","Automated grading: AI can grade essays with rubrics, providing instant feedback at scale","Content creation: AI generates practice problems, quizzes, and supplementary materials for any topic","Accessibility: AI transcribes lectures, translates materials, and generates alternative text for images","Concerns: over-reliance reducing critical thinking skills, equity of access, data privacy for minors"]},
{w:"Week 11",t:"AI in Creative Industries",b:["Content creation: AI assists with copywriting, social media content, and marketing campaign ideation","Image and video: DALL-E, Midjourney, and Stable Diffusion generate visual content from text descriptions","Music: AI tools compose background music, generate sound effects, and assist with music production","Gaming: AI generates game levels, NPC dialogue, and adaptive difficulty systems","Copyright and ownership: legal frameworks are still being established for AI-generated creative works"]},
{w:"Week 11",t:"Emerging Applications and Future Directions",b:["Scientific research: AI assists with literature review, hypothesis generation, and experimental design","Climate and energy: AI optimizes power grids, predicts weather patterns, and models climate scenarios","Manufacturing: AI-driven quality control, predictive maintenance, and supply chain optimization","Government: AI assists with policy analysis, public service delivery, and fraud detection in benefits programs","The trend: AI is becoming a general-purpose tool embedded across virtually every industry"]},
{w:"Week 11",t:"Week 11 Summary and Key Takeaways",b:["AI is transforming every major industry — healthcare, law, finance, education, and creative work","The most successful applications augment human expertise rather than attempting to replace it entirely","Each industry has specific risks: hallucinated legal citations, biased credit decisions, privacy violations","Regulatory frameworks are racing to keep up with deployment — expect significant policy changes","Understanding industry applications helps you identify where AI can add value in your own career"]},// Week 12: Limitations
{w:"Week 12",t:"Hallucinations: When AI Makes Things Up",b:["Hallucination: AI generates confident, plausible-sounding information that is factually incorrect","LLMs predict probable text, not truthful text — they have no mechanism to verify their own claims","Examples: fabricated citations, invented statistics, non-existent people, and fictional historical events","Hallucination rates vary by model and topic — obscure subjects and specific facts are most vulnerable","Mitigation: always verify claims from AI against authoritative sources, especially for consequential decisions"]},
{w:"Week 12",t:"Reasoning Limitations",b:["LLMs struggle with multi-step logical reasoning, especially when steps depend on each other","Math: simple arithmetic can fail — GPT-4 can solve calculus but sometimes miscounts items in a list","Spatial reasoning: 'If I face north and turn left twice, which direction am I facing?' often gets wrong answers","Causal reasoning: AI identifies correlations but struggles to distinguish cause from effect","Planning: AI can outline steps but has difficulty evaluating whether a plan is actually feasible"]},
{w:"Week 12",t:"Knowledge Cutoffs and Temporal Limitations",b:["Models have a training data cutoff — they do not know about events after their last training update","GPT-4's initial cutoff was April 2023; Claude 3 was trained through early 2024","Retrieval-Augmented Generation (RAG) addresses this by fetching current information at query time","Web-connected models (Bing Chat, Perplexity) can access current information but may misinterpret it","Always check: 'When was this model's training data cutoff?' before asking about recent events"]},
{w:"Week 12",t:"Context Window Limitations",b:["Even with large context windows (200K+ tokens), models do not use all context equally","The 'lost in the middle' phenomenon: information in the middle of long contexts is often ignored","Models may contradict earlier parts of a conversation if the context grows too long","Summarization of very long documents may miss key details buried in the middle sections","Practical tip: put the most important information at the beginning and end of your prompt"]},
{w:"Week 12",t:"Overconfidence and Sycophancy",b:["AI models rarely express genuine uncertainty — they generate confident text even when unsure","Sycophancy: models tend to agree with the user rather than push back on incorrect assumptions","If you say 'I think X is true, right?' the model is biased toward confirming, even if X is false","Models may generate multiple contradictory answers if asked the same question different ways","Mitigation: ask the model to consider counterarguments, express confidence levels, and identify uncertainties"]},
{w:"Week 12",t:"Security and Adversarial Attacks",b:["Prompt injection: malicious inputs trick the model into ignoring its instructions or revealing system prompts","Jailbreaking: users craft prompts to bypass safety filters and extract harmful content","Data poisoning: adversaries can corrupt training data to introduce biases or backdoors","Model extraction: competitors can approximate a proprietary model through systematic API querying","These are active research areas — defenses improve, but new attack vectors are regularly discovered"]},
{w:"Week 12",t:"Week 12 Summary and Key Takeaways",b:["Hallucinations are inherent to probabilistic text generation — verification is always necessary","Reasoning limitations mean AI should assist, not replace, human judgment on complex logical tasks","Knowledge cutoffs require awareness of temporal limitations and use of retrieval augmentation","Models are overconfident and sycophantic by default — actively prompt for uncertainty and counterarguments","Understanding limitations is essential for responsible use — knowing what AI cannot do is as important as knowing what it can"]},// Week 13: AI Landscape
{w:"Week 13",t:"Open vs. Closed Models",b:["Closed-source (proprietary): GPT-4, Claude, Gemini — access via API, no model weights available","Open-weight: Llama 3, Mistral, Falcon — model weights publicly available for download and modification","Open-weight does not mean open-source: training data and code may still be proprietary","Closed models lead on benchmarks but open models are closing the gap rapidly","Choice factors: data privacy, cost control, customization needs, and regulatory requirements"]},
{w:"Week 13",t:"Local vs. Cloud Deployment",b:["Cloud APIs: easy to start, always up-to-date, but data leaves your infrastructure","Local deployment: full data privacy, no per-token cost, but requires GPU hardware and technical setup","Tools for local: Ollama, LM Studio, llama.cpp, vLLM — make local deployment increasingly accessible","Hardware requirements: a 7B model runs on a laptop; 70B+ needs professional GPUs ($10K-40K)","Hybrid approaches: use local models for sensitive data and cloud APIs for general tasks"]},
{w:"Week 13",t:"Cost Economics of AI",b:["API pricing: GPT-4 costs ~$30/million input tokens; smaller models are 10-100x cheaper","Claude Haiku vs. Opus: 60x cost difference for the same API — capability tiers matter","Open models: zero per-token cost but significant infrastructure investment (hardware, electricity, maintenance)","For most individual users, API costs are modest ($5-50/month) — enterprise scale is where costs matter","The trend: prices are dropping rapidly — GPT-4 level capability today costs what GPT-3.5 cost at launch"]},
{w:"Week 13",t:"The Model Ecosystem: Specialized Tools",b:["Image generation: DALL-E 3, Midjourney, Stable Diffusion — each with different strengths and styles","Code-specific: GitHub Copilot, Cursor, Codeium — deeply integrated into development workflows","Search-augmented: Perplexity, Bing Chat, Google AI Overviews — combine LLMs with real-time web data","Voice and multimodal: GPT-4o voice, Gemini Live — real-time conversational AI with speech and vision","Embedding models: specialized for search, retrieval, and recommendation rather than generation"]},
{w:"Week 13",t:"Regulation and Policy Landscape",b:["EU AI Act (2024): risk-based framework classifying AI systems from minimal to unacceptable risk","US Executive Order on AI (2023): voluntary commitments from major AI companies, reporting requirements","China: requires AI-generated content to be labeled; restricts models that undermine 'socialist values'","Industry self-regulation: Anthropic, OpenAI, Google publish responsible use policies and safety reports","The regulatory landscape is fragmented globally — what is legal in one jurisdiction may not be in another"]},
{w:"Week 13",t:"Future Trends and Predictions",b:["Multimodal by default: future models will seamlessly handle text, images, audio, video, and code","AI agents: systems that can plan, use tools, browse the web, and complete multi-step tasks autonomously","Personalization: models fine-tuned to individual users' preferences, writing style, and knowledge","Smaller, faster models: efficiency improvements mean phone-capable models approaching current cloud quality","Democratization: AI capabilities becoming accessible to smaller organizations and individuals worldwide"]},
{w:"Week 13",t:"Week 13 Summary and Key Takeaways",b:["The choice between open/closed and local/cloud depends on your priorities: privacy, cost, capability, ease","AI costs are dropping rapidly but remain significant at enterprise scale — understanding pricing matters","Specialized tools often outperform general-purpose models for specific tasks","Regulation is evolving globally with different approaches — stay informed about applicable frameworks","The field is moving toward multimodal, agentic, personalized AI — prepare for continuous learning"]},// Week 14: Personal AI Toolkit
{w:"Week 14",t:"Designing Your Personal AI Toolkit",b:["A personal AI toolkit is your curated set of AI tools, prompts, and workflows for your specific needs","No single tool does everything well — the goal is a complementary set covering your key use cases","Start with your top 5 recurring tasks and identify which AI tools handle each best","Consider: cost, privacy requirements, platform integration, and learning curve for each tool","Your toolkit will evolve — revisit and update it quarterly as new tools emerge and your needs change"]},
{w:"Week 14",t:"Choosing Your Primary LLM",b:["Pick one model to learn deeply rather than superficially using five — mastery beats breadth","For general use: ChatGPT Plus ($20/mo) or Claude Pro ($20/mo) cover most needs well","For budget-conscious users: free tiers of ChatGPT, Claude, and Gemini are surprisingly capable","For privacy-focused users: local models via Ollama or LM Studio keep all data on your device","For developers: API access (OpenAI, Anthropic) enables automation and custom integrations"]},
{w:"Week 14",t:"Building a Prompt Library",b:["A prompt library is a personal collection of tested, effective prompts for your recurring tasks","Categories: writing, analysis, coding, research, communication, decision-making, learning","Template pattern: include placeholders for variable content — [TOPIC], [AUDIENCE], [FORMAT]","Version your prompts: when you improve a prompt, note what changed and why","Share within your team or organization — institutional prompt libraries multiply productivity"]},
{w:"Week 14",t:"Workflow Integration Strategies",b:["Identify friction points in your current workflows where AI could save time or improve quality","Browser extensions: access AI directly while reading articles, writing emails, or researching","IDE integration: Copilot, Cursor, or Codeium for developers — AI in your coding environment","Automation: Zapier, Make, or custom scripts connecting AI APIs to your existing tools","Start with one workflow, measure the improvement, then expand — avoid the trap of adopting everything at once"]},
{w:"Week 14",t:"Evaluating New AI Tools",b:["New AI tools launch weekly — you need a framework for evaluation, not FOMO-driven adoption","Evaluation criteria: does it solve a real problem? Is it better than my current solution? What does it cost?","Trial method: test with 3-5 real tasks from your actual work before committing","Red flags: tools that require excessive permissions, lack clear privacy policies, or have no business model","The best tool is the one you actually use consistently — simplicity and reliability beat features"]},
{w:"Week 14",t:"Staying Current in a Fast-Moving Field",b:["Follow key sources: AI research blogs (Anthropic, OpenAI, Google DeepMind), newsletters, and podcasts","Communities: Reddit r/LocalLLaMA, Hacker News, Twitter/X AI community, Discord servers","Hands-on experimentation: try new models and tools yourself rather than relying solely on reviews","Focus on principles over products: understanding how LLMs work lets you adapt to any new tool","Set a learning budget: 1-2 hours per week is enough to stay informed without being overwhelmed"]},
{w:"Week 14",t:"Week 14 Summary and Key Takeaways",b:["Design your toolkit around your actual needs — not hype, not what influencers recommend","Master one primary LLM deeply before branching out to specialized tools","Build and maintain a prompt library — it is your most portable and valuable AI asset","Integrate AI into existing workflows incrementally — measure impact before expanding","Stay current through trusted sources and hands-on experimentation, with a sustainable time budget"]},// Week 15: Course Wrap-Up
{w:"Week 15",t:"Course Recap: What You Have Learned",b:["Foundations: how AI evolved from Turing's ideas to modern transformer-based language models","Technical literacy: tokenization, embeddings, attention, generation, and model architectures","Practical skills: prompt engineering from basics through advanced techniques (CoT, chaining, few-shot)","Applications: AI for writing, analysis, code, and across major industries","Critical thinking: ethics, bias, limitations, academic integrity, and responsible use"]},
{w:"Week 15",t:"The Skills That Transfer",b:["Prompt engineering: the ability to communicate effectively with AI systems will remain valuable regardless of which models exist","Critical evaluation: knowing how to verify, question, and improve AI outputs","Ethical reasoning: frameworks for thinking about bias, fairness, transparency, and accountability","Adaptability: understanding principles lets you learn any new AI tool quickly","Meta-learning: you now know how to stay current in a rapidly evolving field"]},
{w:"Week 15",t:"Common Pitfalls to Avoid Going Forward",b:["Over-reliance: using AI as a crutch that atrophies your own thinking and writing skills","Under-utilization: avoiding AI out of fear or principle when it could genuinely help","Blind trust: accepting AI outputs without verification, especially for consequential decisions","Hype-chasing: adopting every new tool instead of mastering a focused, effective toolkit","Ignoring ethics: treating AI as purely technical without considering its human impact"]},
{w:"Week 15",t:"The Future You Are Entering",b:["AI capabilities will continue to improve rapidly — what seems impressive today will be baseline tomorrow","AI literacy is becoming as fundamental as computer literacy was in the 2000s","The job market increasingly values people who can work effectively with AI tools","Human skills that AI cannot replicate: empathy, ethical judgment, creativity, leadership, relationship-building","Your competitive advantage is not knowing AI — it is combining AI fluency with your unique domain expertise"]},
{w:"Week 15",t:"Final Project Overview",b:["Choose a real problem in your field of study or interest that AI can help address","Demonstrate: tool selection, prompt engineering, critical evaluation, and ethical consideration","Deliverables: project report (2000 words), prompt library (10+ tested prompts), reflection essay","Evaluation criteria: practical impact, prompt quality, critical analysis, and ethical awareness","Due date: two weeks from today — office hours available for project guidance"]},
{w:"Week 15",t:"Resources for Continued Learning",b:["Free courses: DeepLearning.AI (Andrew Ng), fast.ai, Google AI Essentials on Coursera","Research: arXiv.org for papers, Hugging Face for model exploration, Papers With Code for benchmarks","Communities: r/LocalLLaMA, Hacker News, AI-focused Discord servers and Twitter/X accounts","Newsletters: The Batch (Andrew Ng), Import AI (Jack Clark), Ahead of AI (Sebastian Raschka)","Practice: the single best way to improve is consistent, deliberate use of AI tools on real problems"]},
{w:"Week 15",t:"Thank You and Final Thoughts",b:["You are now equipped with foundational knowledge that most people — including many professionals — lack","AI is a tool that amplifies human capability; its value depends entirely on how thoughtfully you use it","Stay curious, stay skeptical, stay ethical — these three qualities will serve you well","The best AI users are not the most technical — they are the most thoughtful and creative","Congratulations on completing GENAI 101 — go build something meaningful with what you have learned"]}
];
function App() {
  const [idx, setIdx] = React.useState(0);
  const total = slides.length;
  const slide = slides[idx];

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); setIdx(i => Math.min(i + 1, total - 1)); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
      if (e.key === 'Home') { e.preventDefault(); setIdx(0); }
      if (e.key === 'End') { e.preventDefault(); setIdx(total - 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total]);

  return (
    <div id="root-inner">
      <div className="header">
        <h1>GENAI 101: Foundations of Generative AI</h1>
        <p>University of Michigan &bull; School of Information</p>
      </div>
      <div className="slide-container">
        <div className="week-label">{slide.w}</div>
        <div className="slide-title">{slide.t}</div>
        <ul className="slide-bullets">
          {slide.b.map((bullet, i) => <li key={i}>{bullet}</li>)}
        </ul>
      </div>
      <div className="controls">
        <button disabled={idx === 0} onClick={() => setIdx(idx - 1)}>&larr; Previous</button>
        <span className="slide-counter">Slide {idx + 1} of {total}</span>
        <button disabled={idx === total - 1} onClick={() => setIdx(idx + 1)}>Next &rarr;</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
